<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FB_URL_KEY = 'wondag_fb_url';
const DEFAULT_FB_URL = 'https://ull-roasting-default-rtdb.firebaseio.com/';
let DB_URL = localStorage.getItem(FB_URL_KEY) || DEFAULT_FB_URL;

let db = null;
let unsubscribe = null;
let state = { 'CBOB-120': [], 'CBOB-30': [], 'CBOB-5': [] };
let curMachine = 'CBOB-120';
let curView = 'dashboard';
let dashSub = 'today';
function todayKST() {
  return new Date(Date.now() + 9 * 3600 * 1000).toISOString().slice(0, 10);
}
function nowTimeKST() {
  return new Date(Date.now() + 9 * 3600 * 1000).toISOString().slice(11, 16);
}
function fmtAmPm(hhmm) {
  if (!hhmm || !/^\d{1,2}:\d{2}$/.test(hhmm)) return '';
  const [h, m] = hhmm.split(':').map(Number);
  const ap = h < 12 ? '오전' : '오후';
  let h12 = h % 12; if (h12 === 0) h12 = 12;
  return `${ap} ${h12}:${String(m).padStart(2, '0')}`;
}
let dashDate = todayKST();
let editingItemId = null;
let editingLogId = null;
let detailItemId = null;

function initFirebase(url) {
  DB_URL = url;
  localStorage.setItem(FB_URL_KEY, url);
  try {
    const app = initializeApp({ databaseURL: url }, 'wondag-' + Date.now());
    db = getDatabase(app);
    startSync();
  } catch(e) {
    setSyncState('err', '연결 실패');
  }
}

function startSync() {
  if (!db) return;
  setSyncState('', '연결중...');
  const dbRef = ref(db, 'profiles');
  if (unsubscribe) unsubscribe();
  unsubscribe = onValue(dbRef, snap => {
    const data = snap.val();
    if (data) {
      ['CBOB-120','CBOB-30','CBOB-5'].forEach(m => {
        state[m] = data[m] ? Object.entries(data[m]).map(([id, v]) => ({ id, ...v })) : [];
      });
    } else {
      state = { 'CBOB-120': [], 'CBOB-30': [], 'CBOB-5': [] };
    }
    render();
    setSyncState('ok', '동기화됨');
  }, () => { setSyncState('err', '오류'); });

  const setRef = ref(db, 'settings');
  onValue(setRef, snap => {
    const data = snap.val();
    machineSettings = { 'CBOB-120': {}, 'CBOB-30': {}, 'CBOB-5': {} };
    if (data) {
      ['CBOB-120','CBOB-30','CBOB-5'].forEach(m => {
        if (data[m]) machineSettings[m] = data[m];
      });
    }
    render();
  });
}

function setSyncState(s, label) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (s ? ' ' + s : '');
  document.getElementById('syncLabel').textContent = label;
}

async function dbSave(machine, item) {
  if (!db) return;
  const { id, ...data } = item;
  await set(ref(db, `profiles/${machine}/${id}`), data);
}
async function dbDelete(machine, itemId) {
  if (!db) return;
  await remove(ref(db, `profiles/${machine}/${itemId}`));
}

const SETTINGS_SCHEMA = {
  'CBOB-120': {
    설정값: ['DRUM SPEED', 'AIR FLOW'],
    투입온도: ['DRUM', 'AIR', 'CYCLONE'],
    '화력 / 예열': ['화력', '예열', '예열시간'],
  },
  'CBOB-30': {
    설정값: ['DRUM SPEED', 'AIR FLOW'],
    투입온도: ['DRUM', 'AIR'],
    '화력 / 예열': ['화력', '예열', '예열시간'],
  },
  'CBOB-5': {
    설정값: ['DRUM SPEED', 'AIR FLOW'],
    투입온도: ['DRUM', 'AIR'],
    '화력 / 예열': ['화력', '예열', '예열시간'],

};
let machineSettings = { 'CBOB-120': {}, 'CBOB-30': {}, 'CBOB-5': {} };
let searchQuery = '';

async function dbSaveSettings(machine, vals) {
  if (!db) return;

}

function render() {
  const el = document.getElementById('content');
  if (!DB_URL) { el.innerHTML = configBanner(); return; }

  if (curView === 'dashboard') { renderDashboard(); return; }

  const allItems = state[curMachine] || [];
  let html = renderSettings();
  if (allItems.length > 0) {
    html += `<div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" placeholder="품목 검색" oninput="onSearch(this.value)" />
      <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    </div>`;
  }
  html += `<div id="itemList"></div>`;
  html += `<button class="add-item-btn" onclick="openAddItem()">＋ 품목 추가</button>`;
  el.innerHTML = html;

  const si = document.getElementById('searchInput');
  if (si) {
    si.value = searchQuery;
    document.getElementById('searchClear').classList.toggle('show', !!searchQuery);
  }
  renderItemList();
}

function itemRecency(item) {
  const logs = item.logs ? Object.entries(item.logs) : [];
  if (!logs.length) return { date: '', lid: '' };
  let best = { date: '', lid: '' };
  logs.forEach(([id, l]) => {
    const d = l.date || '';
    if (d > best.date || (d === best.date && id > best.lid)) {
      best = { date: d, lid: id };
    }
  });
  return best;
}

function renderItemList() {
  const listEl = document.getElementById('itemList');
  if (!listEl) return;
  const allItems = (state[curMachine] || []).slice().sort((a, b) => {
    const ra = itemRecency(a), rb = itemRecency(b);
    if (rb.date !== ra.date) return rb.date < ra.date ? -1 : 1;
    if (rb.lid !== ra.lid) return rb.lid < ra.lid ? -1 : 1;
    return 0;
  });
  const q = searchQuery.trim().toLowerCase();
  const items = q ? allItems.filter(i => (i.name || '').toLowerCase().includes(q)) : allItems;

  if (!allItems.length) {
    listEl.innerHTML = '<div class="empty">📋 품목을 추가해주세요</div>';
  } else if (!items.length) {
    listEl.innerHTML = `<div class="empty">"${searchQuery}" 검색 결과가 없습니다</div>`;
  } else {
    listEl.innerHTML = items.map(renderItem).join('');
  }
}

window.onSearch = function(v) {
  searchQuery = v;
  document.getElementById('searchClear').classList.toggle('show', !!v.trim());
  renderItemList();
};
window.clearSearch = function() {
  searchQuery = '';
  const si = document.getElementById('searchInput');
  if (si) si.value = '';
  document.getElementById('searchClear').classList.remove('show');
  renderItemList();
};

function fbKey(s) {
  return s.replace(/[.#$/\[\]\s]/g, '_');
}

function renderSettings() {
  const schema = SETTINGS_SCHEMA[curMachine];
  const vals = machineSettings[curMachine] || {};
  const groups = Object.entries(schema).map(([group, keys]) => {
    const gkey = fbKey(group);
    const valHtml = keys.map(k => {
      const v = (vals[gkey] && vals[gkey][fbKey(k)]) ? vals[gkey][fbKey(k)] : '—';
      return `<div class="settings-val"><span class="k">${k}</span><span class="v">${v}</span></div>`;
    }).join('');
    return `<div class="settings-group">
      <div class="settings-group-label">${group}</div>
      <div class="settings-vals">${valHtml}</div>
    </div>`;
  }).join('');

  return `<div class="settings-card">
    <div class="settings-head">
      <span class="settings-title">⚙ 세팅값</span>
      <button class="icon-btn" onclick="openEditSettings()" title="세팅 수정" style="color:var(--accent2)">✎</button>
    </div>
    <div class="settings-body">${groups}</div>
  </div>`;
}

function configBanner() {
  return `<div class="config-banner">
    <h3>🔧 Firebase 연결 필요</h3>

  if (f === 'D') return 'flag-d';

window.saveSettings = async function() {
  const schema = SETTINGS_SCHEMA[curMachine];
  const out = {};
  Object.entries(schema).forEach(([group, keys], gi) => {
    const gkey = fbKey(group);
    out[gkey] = {};
    keys.forEach((k, ki) => {
      const v = document.getElementById(`set-${gi}-${ki}`).value.trim();
      if (v) out[gkey][fbKey(k)] = v;
    });
  });
  await dbSaveSettings(curMachine, out);
  closeModal();
};

  return `<div class="item-card">

}

window.saveItem = async function() {
  const name = document.getElementById('fi-name').value.trim();

  const input = document.getElementById('fi-input').value.trim();
  const blendComp = bcCollect();

    const item = findItem(editingItemId);

    item.blend = blend;
    item.input = input;
    item.blendComp = blendComp;
    await dbSave(curMachine, item);
  } else {
    const newItem = { id: 'i' + Date.now(), name, blend, input, blendComp, logs: {} };
    await dbSave(curMachine, newItem);
  }
  closeModal();
};

const ORIGIN_COLORS = ['#BA7517','#639922','#378ADD','#993C1D','#534AB7','#1D9E75','#D4537E','#854F0B','#0F6E56','#A32D2D'];
function originColor(i) { return ORIGIN_COLORS[i % ORIGIN_COLORS.length]; }

let bcData = [];
function bcRender(arr) {
  bcData = (arr && arr.length) ? arr.map(x => ({ origin: x.origin || '', pct: x.pct != null ? x.pct : '' })) : [];
  bcPaint();
}
function bcPaint() {
  const list = document.getElementById('bc-list');
  if (!list) return;
  list.innerHTML = bcData.map((c, i) => `
    <div class="bc-row">
      <input class="form-input" placeholder="산지 (예: 브라질)" value="${c.origin}" oninput="bcSet(${i},'origin',this.value)" autocomplete="off" />
      <input class="form-input" type="number" placeholder="%" value="${c.pct}" oninput="bcSet(${i},'pct',this.value)" />
      <button type="button" class="bc-del" onclick="bcRemove(${i})">✕</button>
    </div>`).join('');
  bcSum();
}
window.bcAddRow = function() { bcData.push({ origin: '', pct: '' }); bcPaint(); };
window.bcRemove = function(i) { bcData.splice(i, 1); bcPaint(); };
window.bcSet = function(i, k, v) { if (bcData[i]) bcData[i][k] = v; bcSum(); };
function bcSum() {
  const el = document.getElementById('bc-sum');
  if (!el) return;
  const rows = bcData.filter(c => c.origin && c.pct !== '' && c.pct != null);
  if (!rows.length) { el.textContent = ''; el.className = 'bc-sum'; return; }
  const total = rows.reduce((s, c) => s + (parseFloat(c.pct) || 0), 0);
  const barEl = rows.map((c, i) => `<div class="bc-seg" style="width:${Math.max(0, parseFloat(c.pct) || 0)}%;background:${originColor(i)}">${c.origin} ${c.pct}</div>`).join('');
  el.innerHTML = `합계 ${Math.round(total * 10) / 10}%${total === 100 ? ' ✓' : ' (100%가 되도록 조정하세요)'}<div class="bc-bar">${barEl}</div>`;
  el.className = 'bc-sum ' + (total === 100 ? 'ok' : 'bad');
}
function bcCollect() {
  return bcData
    .map(c => ({ origin: (c.origin || '').trim(), pct: parseFloat(c.pct) }))
    .filter(c => c.origin && !isNaN(c.pct) && c.pct > 0);
}

      <label class="form-label">1차 크랙</label>
      <div class="form-row2">
        <input class="form-input" id="fl-ct" type="number" placeholder="온도 182" value="${crackTemp}" />
        <input class="form-input" id="fl-ctime" placeholder="시간 16:55" value="${crackTime}" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">배출</label>
      <div class="form-row2">
        <input class="form-input" id="fl-dt" type="number" placeholder="온도 197" value="${disTemp}" />
        <input class="form-input" id="fl-dtime" placeholder="시간 20:10" value="${disTime}" />
      </div>
    </div>
    <div class="form-group">
      <div class="form-row3">
        <div>
          <label class="form-label">DTR</label>
          <input class="form-input" id="fl-dtr" placeholder="3:15" value="${l.dtr || ''}" />
        </div>
        <div>
          <label class="form-label">무게 (kg)</label>
          <input class="form-input" id="fl-weight" type="number" step="0.01" placeholder="57.84" value="${l.weight || ''}" />
        </div>
        <div>
          <label class="form-label">플래그</label>
          <select class="form-select" id="fl-flag">
            <option value="" ${!l.flag ? 'selected' : ''}>없음</option>
            <option value="1" ${l.flag === '1' ? 'selected' : ''}>1</option>
            <option value="D" ${l.flag === 'D' ? 'selected' : ''}>D</option>
            <option value="R" ${l.flag === 'R' ? 'selected' : ''}>R</option>
            <option value="★" ${l.flag === '★' ? 'selected' : ''}>★</option>
          </select>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">메모 (설정변경·블렌딩 비율 등)</label>
      <textarea class="form-textarea" id="fl-memo" placeholder="예: 배기 1300 화력최대">${l.memo || ''}</textarea>
    </div>`;
}

function getLogFormData() {
  const ct = document.getElementById('fl-ct').value.trim();
  const ctime = document.getElementById('fl-ctime').value.trim();
  const dt = document.getElementById('fl-dt').value.trim();
  const dtime = document.getElementById('fl-dtime').value.trim();
  return {
    date: document.getElementById('fl-date').value,
    crack: [ct, ctime].filter(Boolean).join(' '),
    discharge: [dt, dtime].filter(Boolean).join(' '),
    dtr: document.getElementById('fl-dtr').value.trim(),
    weight: document.getElementById('fl-weight').value.trim(),
    flag: document.getElementById('fl-flag').value,
    memo: document.getElementById('fl-memo').value.trim(),
  };
}

function refPanelHtml(itemId) {
  const item = findItem(itemId);
  if (!item || !item.logs) return '';
  const logs = Object.entries(item.logs).map(([id, v]) => ({ id, ...v }))
    .sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const recent = logs.slice(-3).reverse();
  if (!recent.length) return '';
  const rows = recent.map(l => {
    const w = l.weight ? `<span class="rw">${l.weight}kg</span>` : '';
    const d = l.date ? `<span class="rdt">${l.date.slice(5).replace('-', '/')}</span>` : '';
    const payload = encodeURIComponent(JSON.stringify({
      crack: l.crack || '', discharge: l.discharge || '', dtr: l.dtr || '', weight: l.weight || ''
    }));
    return `<div class="ref-row" onclick="fillFromRef('${payload}')">
      <span class="rc">${l.crack || '—'} / ${l.discharge || '—'}</span>
      <span class="rd">${l.dtr || '—'}</span>
      ${w}${d}
    </div>`;
  }).join('');
  return `<div class="ref-panel">
    <div class="ref-title"><span>↺ 최근 기록 3개</span></div>
    <div class="ref-list">${rows}</div>
    <div class="ref-hint">탭하면 값이 입력란에 채워집니다</div>
  </div>`;
}

window.fillFromRef = function(payload) {
  let d;
  try { d = JSON.parse(decodeURIComponent(payload)); } catch(e) { return; }
  const crackParts = (d.crack || '').split(' ');
  const disParts = (d.discharge || '').split(' ');
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
  set('fl-ct', crackParts[0] || '');
  set('fl-ctime', crackParts[1] || '');
  set('fl-dt', disParts[0] || '');
  set('fl-dtime', disParts[1] || '');
  set('fl-dtr', d.dtr || '');
  set('fl-weight', d.weight || '');
};

window.openAddLog = function(itemId) {
  editingLogId = null;
  editingItemId = itemId;
  document.getElementById('modalTitle').textContent = '배치 기록 추가';
  document.getElementById('modalBody').innerHTML = refPanelHtml(itemId) + logFormHtml();
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn-cancel" onclick="closeModal()">취소</button>
    <button class="btn-save" onclick="saveLog()">저장</button>`;
  showModal();
};

window.openEditLog = function(itemId, logId) {
  const item = findItem(itemId);
  const logs = item.logs || {};
  const log = logs[logId] || {};
  editingItemId = itemId;
  editingLogId = logId;
  document.getElementById('modalTitle').textContent = '배치 수정';
  document.getElementById('modalBody').innerHTML = logFormHtml(log);
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn-delete" onclick="doDeleteLog()">삭제</button>
    <button class="btn-save" onclick="saveLog()">저장</button>`;
  showModal();
};

window.saveLog = async function() {
  const data = getLogFormData();
  if (editingLogId) {
    const existing = (findItem(editingItemId)?.logs || {})[editingLogId] || {};
    if (existing.time) data.time = existing.time;
    await set(ref(db, `profiles/${curMachine}/${editingItemId}/logs/${editingLogId}`), data);
  } else {
    data.time = nowTimeKST();
    const logId = 'l' + Date.now();
    await set(ref(db, `profiles/${curMachine}/${editingItemId}/logs/${logId}`), data);
  }
  closeModal();
};

window.doDeleteLog = async function() {
  if (!confirm('이 배치 기록을 삭제할까요?')) return;
  await remove(ref(db, `profiles/${curMachine}/${editingItemId}/logs/${editingLogId}`));
  closeModal();
};

window.openDetail = function(itemId) {
  detailItemId = itemId;
  const item = findItem(itemId);
  const logs = item.logs ? Object.entries(item.logs).map(([id, v]) => ({ id, ...v })).sort((a, b) => (b.date || '').localeCompare(a.date || '')) : [];
  const rows = logs.map(l => {
    const fHtml = l.flag ? `<span class="flag ${flagClass(l.flag)}" style="margin-left:0">${l.flag}</span>` : '';
    return `<div class="detail-item">
      <div class="detail-item-head">
        <span class="detail-date">${l.date || '—'} ${fHtml}</span>
        <div class="detail-btns">
          <button class="detail-edit-btn" onclick="openEditLog('${itemId}','${l.id}')">수정</button>
        </div>
      </div>
      <div class="detail-vals">
        <span class="detail-val">1크 <b>${l.crack || '—'}</b></span>
        <span class="detail-val">배출 <b>${l.discharge || '—'}</b></span>
        <span class="detail-val">DTR <b>${l.dtr || '—'}</b></span>
        ${l.weight ? `<span class="detail-val">무게 <b>${l.weight}kg</b></span>` : ''}
      </div>
      ${l.memo ? `<div class="detail-memo">✎ ${l.memo}</div>` : ''}
    </div>`;
  }).join('') || '<div class="empty">기록 없음</div>';

  document.getElementById('modalTitle').textContent = item.name + ' · 전체 이력';
  document.getElementById('modalBody').innerHTML = rows;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn-cancel" style="flex:1" onclick="closeModal()">닫기</button>
    <button class="btn-save" onclick="openAddLog('${itemId}')">+ 추가</button>`;
  showModal();
};

function findItem(id) {
  for (const m of ['CBOB-120','CBOB-30','CBOB-5']) {
    const f = (state[m] || []).find(i => i.id === id);
    if (f) return f;
  }
}

function parseInputKg(raw) {
  if (!raw) return 0;
  const s = String(raw).trim();
  const m = s.match(/([\d.]+)\s*(kg|g)?/i);
  if (!m) return 0;
  let v = parseFloat(m[1]);
  if (isNaN(v)) return 0;
  const unit = (m[2] || 'kg').toLowerCase();
  return unit === 'g' ? v / 1000 : v;
}

function allItemsFlat() {
  const out = [];
  ['CBOB-120','CBOB-30','CBOB-5'].forEach(m => {
    (state[m] || []).forEach(it => out.push({ machine: m, item: it }));
  });
  return out;
}

function batchesByDate(targetDate) {
  const result = [];
  allItemsFlat().forEach(({ machine, item }) => {
    const logs = item.logs ? Object.entries(item.logs).map(([id, v]) => ({ id, ...v })) : [];
    logs.forEach(l => {
      if (l.date === targetDate) result.push({ machine, item, log: l, id: l.id });
    });
  });
  return result;
}

function sortBatches(list, ascending) {
  return list.slice().sort((a, b) => {
    const ta = a.log.time || '', tb = b.log.time || '';
    if (ta !== tb) {
      if (!ta) return ascending ? -1 : 1;
      if (!tb) return ascending ? 1 : -1;
      return ascending ? (ta < tb ? -1 : 1) : (tb < ta ? -1 : 1);
    }
    return ascending ? (a.id < b.id ? -1 : 1) : (b.id < a.id ? -1 : 1);
  });
}

function renderDashboard() {
  const el = document.getElementById('content');
  const subTabs = `<div class="dash-sub">
    <div class="dsub ${dashSub==='today'?'on':''}" onclick="setDashSub('today')">현황</div>
    <div class="dsub ${dashSub==='date'?'on':''}" onclick="setDashSub('date')">날짜조회</div>
    <div class="dsub ${dashSub==='origin'?'on':''}" onclick="setDashSub('origin')">산지별</div>
    <div class="dsub ${dashSub==='blend'?'on':''}" onclick="setDashSub('blend')">블렌드</div>
  </div>`;
  let body = '';
  if (dashSub === 'today') body = dashToday();
  else if (dashSub === 'date') body = dashDateView();
  else if (dashSub === 'origin') body = dashOrigin();
  else if (dashSub === 'blend') body = dashBlend();
  el.innerHTML = subTabs + body;
}

window.setDashSub = function(s) { dashSub = s; renderDashboard(); };

function assignAmPmNumbers(list) {
  const withTime = list.filter(b => b.log.time && /^\d{1,2}:\d{2}$/.test(b.log.time));
  const amSorted = withTime.filter(b => Number(b.log.time.split(':')[0]) < 12)
    .sort((a, b) => a.log.time < b.log.time ? -1 : 1);
  const pmSorted = withTime.filter(b => Number(b.log.time.split(':')[0]) >= 12)
    .sort((a, b) => a.log.time < b.log.time ? -1 : 1);
  const labels = {};
  amSorted.forEach((b, i) => { labels[b.id] = { ap: '오전', n: i + 1 }; });
  pmSorted.forEach((b, i) => { labels[b.id] = { ap: '오후', n: i + 1 }; });
  return labels;
}

function dashBatchCards(list, labels) {
  if (!list.length) return '<div class="empty">해당 날짜에 기록된 로스팅이 없습니다</div>';
  return list.map(({ machine, item, log, id }) => {
    const tm = log.time ? `<span class="d-ctime">${fmtAmPm(log.time)}</span>` : '';
    const inpRaw = item.input ? (/[a-zA-Z]/.test(item.input) ? item.input : item.input + 'kg') : '';
    const hasW = (log.weight !== undefined && log.weight !== null && String(log.weight).trim() !== '');
    const parts = [];
    if (inpRaw) parts.push(`투입 ${inpRaw}`);
    let lossHtml = '';
    if (hasW) {
      parts.push(`배출 ${log.weight}kg`);
      const inKg = parseInputKg(item.input);
      const outKg = parseInputKg(log.weight);
      if (inKg > 0 && outKg > 0) {
        const pct = (inKg - outKg) / inKg * 100;
        lossHtml = `<span class="d-loss">감량률 ${Math.round(pct * 10) / 10}%</span>`;
      }
    }
    const line = parts.length ? `<div class="d-cline">${parts.join(' · ')}${lossHtml}</div>` : '';
    const lb = labels && labels[id];
    const badge = lb ? `<div class="d-numbadge"><span class="d-nap">${lb.ap}</span><span class="d-nn">${lb.n}</span></div>` : '';
    return `<div class="d-card${badge ? ' d-card-b' : ''}">
      ${badge}
      <div class="d-cbody">
        <div class="d-crow"><span class="d-cname">${item.name}<span class="d-mtag">${machine}</span></span>${tm}</div>
        ${line}
      </div>
    </div>`;
  }).join('');
}

function dashSummaryHead(list) {
  const batchCount = list.length;
  let totalKg = 0;
  list.forEach(r => { totalKg += parseInputKg(r.item.input); });
  return `<div class="d-mcards">
    <div class="d-mc"><div class="d-mc-l">완료 배치</div><div class="d-mc-v">${batchCount}건</div></div>
    <div class="d-mc"><div class="d-mc-l">생두 투입량</div><div class="d-mc-v">${Math.round(totalKg * 10) / 10}kg</div></div>
  </div>`;
}

function dashToday() {
  const today = todayKST();
  const list = sortBatches(batchesByDate(today), false);
  const labels = assignAmPmNumbers(list);
  const head = dashSummaryHead(list);
  const dlabel = `<div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:8px">${today} 오늘</div>`;
  return head + dlabel + dashBatchCards(list, labels);
}

function dashDateView() {
  const list = sortBatches(batchesByDate(dashDate), true);
  const bar = `<div class="d-date-bar">
    <i class="ti ti-calendar" style="color:var(--text3)"></i>
    <input type="date" id="dashDateInput" value="${dashDate}" onchange="setDashDate(this.value)" />
  </div>`;
  const head = dashSummaryHead(list);
  return bar + head + dashBatchCards(list);
}

window.setDashDate = function(v) { dashDate = v; renderDashboard(); };

function originUsage(period) {
  const now = new Date(todayKST() + 'T00:00:00');
  let from = null;
  if (period === 'week') { from = new Date(now); from.setDate(now.getDate() - 7); }
  else if (period === 'month') { from = new Date(now); from.setMonth(now.getMonth() - 1); }
  const usage = {};
  allItemsFlat().forEach(({ item }) => {
    const logs = item.logs ? Object.values(item.logs) : [];
    const kgEach = parseInputKg(item.input);
    if (!kgEach) return;
    logs.forEach(l => {
      if (!l.date) return;
      if (from) { const d = new Date(l.date + 'T00:00:00'); if (d < from) return; }
      const totalForBatch = kgEach;
      if (Array.isArray(item.blendComp) && item.blendComp.length) {
        item.blendComp.forEach(c => {
          const kg = totalForBatch * (c.pct / 100);
          usage[c.origin] = (usage[c.origin] || 0) + kg;
        });
      } else {
        const origin = item.name.replace(/^[^\uAC00-\uD7A3a-zA-Z]+/, '').trim();
        usage[origin] = (usage[origin] || 0) + totalForBatch;
      }
    });
  });
  return Object.entries(usage).map(([origin, kg]) => ({ origin, kg })).sort((a, b) => b.kg - a.kg);
}

let originPeriod = 'week';
function dashOrigin() {
  const data = originUsage(originPeriod);
  const toggle = `<div class="d-seg-toggle">
    <button class="d-seg-btn ${originPeriod==='week'?'on':''}" onclick="setOriginPeriod('week')">주별 (최근7일)</button>
    <button class="d-seg-btn ${originPeriod==='month'?'on':''}" onclick="setOriginPeriod('month')">월별 (최근30일)</button>
  </div>`;
  if (!data.length) {
    return toggle + '<div class="empty">집계할 데이터가 없습니다.<br>날짜와 생두투입량이 입력된 배치만 집계됩니다.</div>';
  }
  const max = data[0].kg || 1;
  const bars = data.map((d, i) => `<div class="d-bar-item">
    <div class="d-bar-top"><span class="d-bar-name">${d.origin}</span><span class="d-bar-val">${Math.round(d.kg * 10) / 10}kg</span></div>
    <div class="d-bar-track"><div class="d-bar-fill" style="width:${Math.max(2, (d.kg / max) * 100)}%;background:${originColor(i)}"></div></div>
  </div>`).join('');
  return toggle + bars;
}
window.setOriginPeriod = function(p) { originPeriod = p; renderDashboard(); };

function dashBlend() {
  const blends = [];
  allItemsFlat().forEach(({ machine, item }) => {
    if (Array.isArray(item.blendComp) && item.blendComp.length) {
      blends.push({ machine, item });
    }
  });
  if (!blends.length) {
    return '<div class="empty">구성비율이 입력된 블렌드가 없습니다.<br>품목 수정에서 블렌드 구성비율을 입력해주세요.</div>';
  }
  return blends.map(({ machine, item }) => {
    const comp = item.blendComp;
    const total = comp.reduce((s, c) => s + c.pct, 0) || 100;
    const kgEach = parseInputKg(item.input);
    const seg = comp.map((c, i) => `<div class="bc-seg" style="width:${(c.pct / total) * 100}%;background:${originColor(i)}">${c.pct}%</div>`).join('');
    const lg = comp.map((c, i) => {
      const kg = kgEach ? ` ${Math.round(kgEach * (c.pct / 100) * 100) / 100}kg` : '';
      return `<span><span class="d-dot" style="background:${originColor(i)}"></span>${c.origin} ${c.pct}%${kg}</span>`;
    }).join('');
    return `<div class="d-blend-item">
      <div class="d-blend-name">${item.name}<span class="d-mtag">${machine}${kgEach ? ' · ' + (Math.round(kgEach*10)/10) + 'kg' : ''}</span></div>
      <div class="bc-bar">${seg}</div>
      <div class="d-lg">${lg}</div>
    </div>`;
  }).join('');
}

window.switchTab = function(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  searchQuery = '';
  if (el.dataset.view === 'dashboard') {
    curView = 'dashboard';
  } else {
    curView = 'machine';
    curMachine = el.dataset.m;
  }
  render();
};

window.connectFirebase = function() {
  const url = document.getElementById('fbUrlInput').value.trim();
  if (!url) return;
  initFirebase(url);
};

function showModal() { document.getElementById('modalBg').classList.add('show'); }
window.closeModal = function() {
  document.getElementById('modalBg').classList.remove('show');
  editingItemId = null; editingLogId = null;
};
window.bgClose = function(e) {
  if (e.target === document.getElementById('modalBg')) closeModal();
};

if (DB_URL) { initFirebase(DB_URL); } else { render(); }
</script>


</body></html>
